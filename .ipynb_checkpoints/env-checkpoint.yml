name: mrr_env
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Núcleo
  - python=3.9
  
  # Manejo de datos
  - numpy
  - pandas
  - xarray
  - netcdf4
  
  # Visualización (Manteniendo las versiones de tu tutorial)
  - matplotlib=3.4.3
  - proplot=0.9.7
  - seaborn
  
  # Procesamiento y Filtros
  - filterpy
  
  # Entorno Jupyter
  - jupyterlab
  - notebook
  - ipykernel